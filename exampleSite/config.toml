baseURL = "/"
locale = "en-US"
title = "Christian Schramm - Portfolio"
enableRobotsTXT = true
enableGitInfo = true
enableEmoji = true

# Theme settings
theme = "terminal"
pagination.pagerSize = 5

# Taxonomies
[taxonomies]
  category = "categories"
  tag = "tags"
  skill = "skills"

# Site parameters
[params]
  subtitle = "Personal portfolio and blog of Christian Schramm - Software Developer and Tech Enthusiast"
  description = "Personal portfolio and blog of Christian Schramm - Software Developer and Tech Enthusiast"
  author = "Christian Schramm"
  email = "contact@chrisschramm.dev" # Updated from example.com
  github = "https://github.com/schrmm"
  linkedin = "https://linkedin.com/in/chrisschramm"
  author_bio = "Software developer passionate about creating efficient, scalable solutions and sharing knowledge through writing and open source contributions."
  
  # Form handling
  contact_form_endpoint = "https://formspree.io/f/xyyqrpvd" # Updated from placeholder
  
  # SEO
  images = ["images/og-image.jpg"]
  keywords = ["software development", "web development", "portfolio", "blog"]
  
  # Theme
  contentTypeName = "blog"
  showMenuItems = 6
  fullWidthTheme = false
  centerTheme = true
  autoCover = true
  mainSections = ["blog", "projects", "case-studies"]
  
  # Content
  dateFormat = "January 2, 2006"
  showReadingTime = true
  showWordCount = true
  showLastMod = true
  
  # Features
  enableSearch = false
  enableDarkMode = true
  enableToc = true

  menuMore = "Show more"
  readMore = "Read more"
  readOtherPosts = "Read other posts"
  newerPosts = "Newer posts"
  olderPosts = "Older posts"
  missingContentMessage = "Page not found..."
  missingBackButtonLabel = "Back to home page"
  minuteReadingTime = "min read"
  words = "words"

  [params.logo]
    logoText = "CHRISTIAN SCHRAMM"
    logoHomeLink = "/"

# Menu
[menu]
  [[menu.main]]
    name = "Home"
    url = "/"
    weight = 1
  [[menu.main]]
    name = "Projects"
    url = "/projects/"
    weight = 2
  [[menu.main]]
    name = "Blog"
    url = "/blog/"
    weight = 3
  [[menu.main]]
    name = "Case Studies"
    url = "/case-studies/"
    weight = 4
  [[menu.main]]
    name = "Resume"
    url = "/resume/"
    weight = 5
  [[menu.main]]
    name = "Contact"
    url = "/contact/"
    weight = 6

# Privacy
[privacy]
  [privacy.disqus]
    disable = true
  [privacy.googleAnalytics]
    disable = true
  [privacy.instagram]
    disable = true
  [privacy.x]
    disable = true
  [privacy.vimeo]
    disable = true
  [privacy.youtube]
    disable = true

# Output formats
[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]

# Markup
[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = true
    lineNumbersInTable = true
    noClasses = false
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

# Build
[build]
  writeStats = true
